<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub Virtual Tour 360 - Waskita Infrastruktur</title>
    <!-- Tailwind CSS untuk styling super cepat & modern -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Warna Khusus Waskita */
        .bg-waskita { background-color: #002d55; }
        .text-waskita { color: #002d55; }
        .border-waskita { border-color: #002d55; }
        
        /* Animasi Kartu */
        .project-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .project-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px -5px rgba(0, 45, 85, 0.2);
            border-left-width: 6px;
            border-left-color: #3498db;
        }
        
        /* Custom Scrollbar untuk list periode agar tidak memakan tempat */
        .periode-list::-webkit-scrollbar { width: 4px; }
        .periode-list::-webkit-scrollbar-track { background: #f1f1f1; }
        .periode-list::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .periode-list::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col font-sans">

    <!-- HEADER PREMIUM -->
    <header class="bg-waskita text-white shadow-lg sticky top-0 z-50">
        <div class="container mx-auto px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-white p-2 rounded-lg">
                    <span class="text-2xl">🏗️</span>
                </div>
                <div>
                    <h1 class="text-xl md:text-2xl font-bold tracking-wide">360° PORTAL DOKUMENTASI</h1>
                    <p class="text-xs md:text-sm text-blue-200 uppercase tracking-widest">Digital Survey & GIS - Divisi Infrastruktur</p>
                </div>
            </div>
            
            <!-- Area Filter di dalam Header -->
            <div class="flex flex-col sm:flex-row gap-3 w-full md:w-auto">
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">🔍</span>
                    <input type="text" id="filterNama" placeholder="Cari proyek..." 
                        class="w-full sm:w-64 pl-10 pr-4 py-2 rounded-md text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-400 shadow-inner">
                </div>
                <input type="month" id="filterPeriode" 
                    class="w-full sm:w-40 px-3 py-2 rounded-md text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-400 shadow-inner cursor-pointer">
                <button onclick="resetFilter()" title="Reset Filter"
                    class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-md transition-colors text-sm font-bold">
                    ↻ Reset
                </button>
            </div>
        </div>
    </header>

    <!-- KONTEN UTAMA -->
    <main class="container mx-auto px-6 py-10 flex-grow">
        <!-- Area Grid Proyek -->
        <div id="projectGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- Loading State -->
            <div class="col-span-full flex flex-col items-center justify-center py-20 text-slate-400">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mb-4"></div>
                <p>Memuat database proyek...</p>
            </div>
        </div>
    </main>

    <!-- FOOTER KORPORAT -->
    <footer class="bg-white border-t border-slate-200 mt-auto py-4">
        <div class="container mx-auto px-6 text-center text-xs text-slate-500 font-medium">
            <span class="text-waskita font-bold">PT WASKITA KARYA (PERSERO) TBK</span> © 2026<br>
            Developed by Tim GIS DS - Divisi Infrastruktur
        </div>
    </footer>

    <!-- LOGIKA JAVASCRIPT -->
    <script>
        let allData = [];

        // 1. Fungsi Mengambil Data JSON
        async function loadProjects() {
            try {
                // Tambahkan parameter waktu agar browser tidak menggunakan cache lama
                const response = await fetch('projects.json?t=' + new Date().getTime());
                if (!response.ok) throw new Error('File tidak ditemukan');
                
                allData = await response.json();
                renderProjects(allData);
            } catch (error) {
                console.error("Gagal memuat:", error);
                document.getElementById('projectGrid').innerHTML = `
                    <div class="col-span-full text-center py-20 bg-white rounded-xl border border-dashed border-slate-300">
                        <span class="text-4xl block mb-3">📂</span>
                        <h2 class="text-lg font-bold text-slate-700">Database Kosong / Tidak Ditemukan</h2>
                        <p class="text-sm text-slate-500 mt-1">Silakan jalankan aplikasi Generator (app.py) dan buat tur pertama Anda untuk menampilkan data di sini.</p>
                    </div>`;
            }
        }

        // 2. Fungsi Menampilkan Data ke Layar
        function renderProjects(data) {
            const grid = document.getElementById('projectGrid');
            grid.innerHTML = "";

            // Mengelompokkan data berdasarkan Nama Proyek
            const grouped = data.reduce((acc, curr) => {
                if (!acc[curr.nama]) acc[curr.nama] = [];
                acc[curr.nama].push(curr);
                return acc;
            }, {});

            const searchKey = document.getElementById('filterNama').value.toLowerCase();
            const monthKey = document.getElementById('filterPeriode').value; // Format: YYYY-MM (contoh: 2026-05)

            let hasResult = false;

            Object.keys(grouped).forEach(nama => {
                const items = grouped[nama];
                
                // Filter berdasarkan Nama
                const matchesName = nama.toLowerCase().includes(searchKey);
                
                // Filter berdasarkan Bulan (Mencocokkan string dari format "06 May 2026" itu rumit,
                // jadi kita akali dengan mengecek string YYYYMMDD di dalam "path" foldernya)
                const filteredItems = items.filter(item => {
                    if (!monthKey) return true;
                    // Ubah "2026-05" menjadi "202605" agar cocok dengan format nama folder Anda
                    const searchMonthFolder = monthKey.replace('-', ''); 
                    return item.path.includes(searchMonthFolder);
                });

                if (matchesName && filteredItems.length > 0) {
                    hasResult = true;
                    const card = document.createElement('div');
                    card.className = "project-card bg-white rounded-xl border border-slate-200 border-l-4 border-slate-300 flex flex-col h-full overflow-hidden";
                    
                    // Membuat list link tanggal
                    let linksHtml = filteredItems.map(item => `
                        <a href="${item.path}/index.html" target="_blank" 
                           class="flex justify-between items-center px-3 py-2 my-1 rounded-md bg-slate-50 hover:bg-blue-50 border border-slate-100 hover:border-blue-200 group transition-all">
                            <span class="text-sm font-medium text-slate-600 group-hover:text-blue-700 flex items-center gap-2">
                                📅 ${item.tanggal}
                            </span>
                            <span class="text-[10px] uppercase font-bold tracking-wider text-blue-500 opacity-0 group-hover:opacity-100 transition-opacity flex items-center">
                                Buka <span class="text-base leading-none ml-1">›</span>
                            </span>
                        </a>
                    `).join('');

                    card.innerHTML = `
                        <div class="p-4 border-b border-slate-100 bg-slate-50/50">
                            <div class="flex justify-between items-start gap-2 mb-1">
                                <h3 class="font-bold text-slate-800 text-sm leading-snug line-clamp-2" title="${nama}">${nama}</h3>
                                <span class="bg-emerald-100 text-emerald-700 text-[9px] font-extrabold px-1.5 py-0.5 rounded uppercase tracking-wide shrink-0">Aktif</span>
                            </div>
                            <p class="text-[10px] text-slate-400 font-medium">${filteredItems.length} Dokumentasi Tersedia</p>
                        </div>
                        <div class="p-3 flex-grow periode-list overflow-y-auto" style="max-height: 180px;">
                            ${linksHtml}
                        </div>
                    `;
                    grid.appendChild(card);
                }
            });

            // Tampilan jika hasil filter kosong
            if (!hasResult) {
                grid.innerHTML = `
                    <div class="col-span-full text-center py-16">
                        <span class="text-3xl block mb-2">🔍</span>
                        <p class="text-slate-500 font-medium">Tidak ada proyek yang sesuai dengan pencarian atau periode tersebut.</p>
                    </div>`;
            }
        }

        // 3. Fungsi Reset
        function resetFilter() {
            document.getElementById('filterNama').value = "";
            document.getElementById('filterPeriode').value = "";
            renderProjects(allData);
        }

        // 4. Event Listener untuk interaksi langsung (Real-time)
        document.getElementById('filterNama').addEventListener('input', () => renderProjects(allData));
        document.getElementById('filterPeriode').addEventListener('change', () => renderProjects(allData));

        // Jalankan saat halaman dimuat
        window.onload = loadProjects;
    </script>
</body>
</html>
